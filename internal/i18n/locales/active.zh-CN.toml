[ScanLongDesc]
other = "扫描并分析整个项目。\n\n此命令将：\n  • 扫描项目中的所有文件\n  • 使用 Claude AI 分析代码\n  • 学习当前的代码库状态\n  • 可选生成 Claude skills\n\n适用于：\n  • 新项目初始化后\n  • 需要全面分析代码库\n  • 生成项目的 skills\n\n示例：\n  # 扫描项目\n  skill-seed scan\n\n  # 扫描并生成 skills\n  skill-seed scan --generate-skills\n\n  # 扫描所有文件类型\n  skill-seed scan --all"

