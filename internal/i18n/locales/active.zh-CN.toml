[HookShort]
other = "管理 Git hooks"

[HookLongDesc]
other = "管理 Git pre-commit hooks。\n\n此命令可以：\n  • 安装 pre-commit hook\n  • 卸载 pre-commit hook\n  • 手动运行 hook 检查\n\n安装后，每次 git commit 前会自动运行 'skill-seed check'。\n\n示例：\n  # 安装 hook\n  skill-seed hook --install\n\n  # 卸载 hook\n  skill-seed hook --uninstall"

