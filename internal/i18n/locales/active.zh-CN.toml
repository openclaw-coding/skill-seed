other = "为 AI 助手培育项目技能"

[RootLong]
other = "一个从 Git 历史中学习的项目级技能，\n帮助 AI 助手更好地理解你的代码库。\n\n此工具集成了 Claude 进行深度代码分析，\n并自动学习你团队的编码模式。"

[InitLongDesc]
other = "在当前项目中初始化 skill-seed。\n\n此命令将：\n  • 创建 .skill-seed/ 目录\n  • 生成默认配置文件 (config.yaml)\n  • 初始化 BoltDB 数据库\n  • 准备 Claude Code skills 模板\n\n请在 Git 仓库根目录运行此命令。\n\n示例：\n  # 在当前项目初始化\n  skill-seed init\n\n  # 强制重新初始化\n  skill-seed init --force"

