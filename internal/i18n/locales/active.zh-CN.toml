[LearnLongDesc]
other = "从 Git 提交历史中学习编码模式。\n\n此命令将：\n  • 分析最近的 Git 提交\n  • 使用 Claude AI 提取编码模式\n  • 保存学到的模式到数据库\n  • 自动生成代码规则\n\n学习完成后，可以使用 'skill-seed check' 来检查代码质量。\n\n示例：\n  # 学习最近 50 个提交\n  skill-seed learn --limit=50\n\n  # 学习最近 30 天的提交\n  skill-seed learn --since=30d\n\n  # 强制重新学习所有提交\n  skill-seed learn --all --force"

[LearnFromHistory]
other = "从 Git 历史学习中"

[LearnAnalyzingCommits]
other = "正在分析 {{.Count}} 个提交..."

[LearnNoCommits]
other = "没有新的提交需要学习"

[CheckShort]
other = "检查暂存的文件"

[CheckNotInitialized]
other = "skill-seed 未初始化"

[CheckRunInitFirst]
other = "请先运行 'skill-seed init' 初始化项目"

[CheckLongDesc]
other = "检查暂存的文件是否符合编码规范。\n\n此命令将：\n  • 获取 Git 暂存的文件\n  • 使用 Claude AI 分析代码\n  • 基于学到的模式发现问题\n  • 提供修复建议\n\n通常通过 Git pre-commit hook 自动运行。\n\n示例：\n  # 检查暂存的文件\n  skill-seed check\n\n  # 检查所有文件\n  skill-seed check --all"

[GenerateShort]
other = "生成 Claude Code skills"

[GenerateNotInitialized]
other = "skill-seed 未初始化"

[GenerateRunInitFirst]
other = "请先运行 'skill-seed init' 初始化项目"

[GenerateLongDesc]
other = "从学到的模式生成 Claude Code skills。\n\n此命令将：\n  • 从数据库读取学到的模式\n  • 生成 SKILL.md 文件\n  • 生成 README.md 文档\n  • 生成参考文档\n\n生成的 skills 可以在 Claude Code 中使用。\n\n示例：\n  # 生成 skills 到默认位置\n  skill-seed generate-skills\n\n  # 指定输出目录\n  skill-seed generate-skills --output .claude/skills\n\n  # 强制覆盖已存在的 skills\n  skill-seed generate-skills --force"

[GenerateGenerating]
